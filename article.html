<!doctype html>
<html lang="th">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title id="page-title">บทความ | Talay Trang</title>
  <meta name="description" id="page-desc" content="บทความเที่ยวทะเลตรัง จาก Talay Trang" />
  <meta name="theme-color" content="#0277bd" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link rel="preconnect" href="https://images.pexels.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+Thai+Looped:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="assets/css/fonts.css" />
  <link rel="stylesheet" href="assets/css/style.css" />
</head>
<body data-tt-page="article">
  <div id="site-header"></div>

  <article class="article-detail">
    <header class="article-hero">
      <div class="article-hero-media"><img id="art-cover" alt=""/></div>
      <div class="container article-hero-inner">
        <a href="articles.html" class="crumb-link">
          <svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M19 12H5M11 5l-7 7 7 7"/></svg>
          กลับสู่บทความทั้งหมด
        </a>
        <span class="article-tag" id="art-tag"></span>
        <h1 id="art-title">—</h1>
        <div class="article-meta light">
          <span id="art-author">—</span>
          <span class="dot"></span>
          <span id="art-date">—</span>
          <span class="dot"></span>
          <span id="art-readtime">—</span>
        </div>
      </div>
    </header>

    <section class="container article-body">
      <div id="art-content" class="article-content"></div>

      <div class="article-cta" data-reveal>
        <div>
          <h3>วางแผนทริปทะเลตรังของคุณกับเรา</h3>
          <p>เลือกเรือ คำนวณราคา และส่งจองผ่าน LINE ได้ใน 2 นาที</p>
        </div>
        <div class="btn-row">
          <a class="btn btn-line btn-lg" href="booking.html"><span data-icon="line"></span>เริ่มจอง</a>
          <a class="btn btn-ghost" href="programs.html">ดูโปรแกรม</a>
        </div>
      </div>

      <div class="article-related" data-reveal>
        <h2>บทความอื่นที่น่าสนใจ</h2>
        <div class="article-grid" id="art-related"></div>
      </div>
    </section>
  </article>

  <div id="site-footer"></div>

  <script>document.write('<script src="assets/js/tt-cache-version.js?t='+Date.now()+'"><\/script>');</script>
  <script>document.write('<script src="assets/js/data-fallback.js?v='+(encodeURIComponent(window.__TT_SCRIPT_V||Date.now()))+'"><\/script>');</script>
  <script>document.write('<script src="assets/js/data.js?v='+(encodeURIComponent(window.__TT_SCRIPT_V||Date.now()))+'"><\/script>');</script>
  <script>document.write('<script src="assets/js/main.js?v='+(encodeURIComponent(window.__TT_SCRIPT_V||Date.now()))+'"><\/script>');</script>
  <script>
    document.addEventListener('DOMContentLoaded', () => {
      const { ARTICLES, IMAGES } = window.TT;
      const params = new URLSearchParams(location.search);
      const slug = params.get('slug') || (ARTICLES[0] && ARTICLES[0].slug);
      const article = ARTICLES.find(a => a.slug === slug) || ARTICLES[0];

      if (!article) return;

      // Page metadata
      document.getElementById('page-title').textContent = `${article.title} | Talay Trang`;
      document.getElementById('page-desc').setAttribute('content', article.excerpt);

      // Hero
      document.getElementById('art-cover').src = article.cover;
      document.getElementById('art-cover').alt = article.title;
      document.getElementById('art-tag').textContent = article.category;
      document.getElementById('art-title').textContent = article.title;
      document.getElementById('art-author').textContent = article.author;
      document.getElementById('art-date').textContent = article.date;
      document.getElementById('art-readtime').textContent = 'อ่าน ' + article.readTime;

      // Body — render each block by type
      const blockHtml = (b) => {
        switch (b.type) {
          case 'h2':    return `<h2>${b.text}</h2>`;
          case 'p':     return `<p>${b.text}</p>`;
          case 'quote': return `<blockquote class="article-quote">${b.text}</blockquote>`;
          case 'list':  return `<ul class="article-list">${b.items.map(it => `<li>${it}</li>`).join('')}</ul>`;
          case 'img':   return `<figure class="article-figure"><img src="${b.src}" alt="${b.alt || ''}" loading="lazy"/></figure>`;
          default:      return '';
        }
      };
      document.getElementById('art-content').innerHTML = article.body.map(blockHtml).join('');

      // Related articles (อื่นๆ ที่ไม่ใช่ตัวนี้)
      const related = ARTICLES.filter(a => a.slug !== article.slug).slice(0, 3);
      document.getElementById('art-related').innerHTML = related.map((a, i) => `
        <a class="article-card" href="article.html?slug=${a.slug}" style="--rd:${i*.05}s" data-reveal>
          <div class="article-card-media">
            <img src="${a.thumb}" alt="${a.title}" loading="lazy"/>
            <span class="article-tag">${a.category}</span>
          </div>
          <div class="article-card-body">
            <h3>${a.title}</h3>
            <p>${a.excerpt}</p>
            <div class="article-meta">
              <span>${a.date}</span>
              <span class="dot"></span>
              <span>${a.readTime}</span>
            </div>
          </div>
        </a>
      `).join('');

      window.TT.injectIcons();
      window.TT.bindReveal();
      window.scrollTo({ top: 0, behavior: 'instant' });
    });
  </script>
</body>
</html>
