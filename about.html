<!doctype html>
<html lang="th">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>เกี่ยวกับเรา — Talay Trang เช่าเรือตรัง โดยเจ้าถิ่นกันตัง</title>
  <meta name="description" content="Talay Trang ทีมงานเจ้าถิ่นกันตัง บริการเช่าเรือเที่ยวทะเลตรัง มีออฟฟิศจริง รู้เส้นทาง ดูแลตั้งแต่ก่อนเดินทางจนจบทริป" />
  <meta name="theme-color" content="#0277bd" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link rel="preconnect" href="https://images.pexels.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+Thai+Looped:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="assets/css/fonts.css" />
  <link rel="stylesheet" href="assets/css/style.css" />
</head>
<body data-tt-page="about">
  <div id="site-header"></div>

  <section class="hero-sub">
    <div class="hero-media"><img id="hero-img" alt="" /></div>
    <div class="container hero-inner" data-reveal>
      <span class="crumb" id="about-crumb"></span>
      <h1 id="about-hero-title"></h1>
      <p class="lead" id="about-hero-lead"></p>
    </div>
  </section>

  <section class="section">
    <div class="container">
      <div class="grid grid-2" style="align-items:center;">
        <div data-reveal>
          <span class="eyebrow" id="about-story-eyebrow"></span>
          <h2 id="about-story-title"></h2>
          <div id="about-story-paragraphs"></div>
          <div class="btn-row" style="margin-top:1.4rem;" id="about-story-ctas"></div>
        </div>
        <div class="story-grid" id="story-grid"></div>
      </div>
    </div>
  </section>

  <section class="section section-soft">
    <div class="container">
      <div class="section-head" data-reveal>
        <span class="eyebrow" id="about-why-eyebrow"></span>
        <h2 id="about-why-title"></h2>
      </div>
      <div class="grid grid-4" id="why-list"></div>
    </div>
  </section>

  <section class="section">
    <div class="container">
      <div class="trust" data-reveal id="about-trust"></div>
    </div>
  </section>

  <section class="section section-soft">
    <div class="container">
      <div class="section-head left" data-reveal>
        <span class="eyebrow" id="about-office-eyebrow"></span>
        <h2 id="about-office-title"></h2>
      </div>
      <div class="office" data-reveal>
        <div class="office-map">
          <iframe id="about-map" loading="lazy" title="แผนที่ออฟฟิศ Talay Trang"></iframe>
        </div>
        <div class="office-info">
          <h2 id="about-office-info-title"></h2>
          <p id="about-office-info-text"></p>
          <ul class="contact-list" id="about-contact-list"></ul>
        </div>
      </div>
    </div>
  </section>

  <section class="section section-deep">
    <div class="container text-center" data-reveal>
      <h2 id="about-cta-title"></h2>
      <p class="lead" style="max-width:540px; margin:0 auto 1.6rem;" id="about-cta-lead"></p>
      <div class="btn-row center" id="about-cta-buttons"></div>
    </div>
  </section>

  <div id="site-footer"></div>

  <script>document.write('<script src="assets/js/tt-cache-version.js?t='+Date.now()+'"><\/script>');</script>
  <script>document.write('<script src="assets/js/data-fallback.js?v='+(encodeURIComponent(window.__TT_SCRIPT_V||Date.now()))+'"><\/script>');</script>
  <script>document.write('<script src="assets/js/data.js?v='+(encodeURIComponent(window.__TT_SCRIPT_V||Date.now()))+'"><\/script>');</script>
  <script>document.write('<script src="assets/js/main.js?v='+(encodeURIComponent(window.__TT_SCRIPT_V||Date.now()))+'"><\/script>');</script>
  <script>
    document.addEventListener('DOMContentLoaded', () => {
      const { WHY_US, IMAGES, ICONS, SITE, ABOUT } = window.TT;
      const hero = ABOUT.hero || {};
      const story = ABOUT.story || {};
      const whySection = ABOUT.whySection || {};
      const office = ABOUT.office || {};
      const cta = ABOUT.cta || {};
      const ctaPrimary = story.ctaPrimary || {};
      const ctaSecondary = story.ctaSecondary || {};

      document.getElementById('hero-img').src = IMAGES.heroAbout;
      document.getElementById('hero-img').alt = hero.heroAlt || 'ทีมงาน Talay Trang ที่ทะเลตรัง';
      document.getElementById('about-crumb').textContent = hero.crumb || '';
      document.getElementById('about-hero-title').textContent = hero.title || '';
      document.getElementById('about-hero-lead').textContent = hero.lead || '';

      document.getElementById('about-story-eyebrow').textContent = story.eyebrow || '';
      document.getElementById('about-story-title').textContent = story.title || '';
      document.getElementById('about-story-paragraphs').innerHTML = (story.paragraphs || [])
        .map(p => `<p>${p}</p>`).join('');
      document.getElementById('about-story-ctas').innerHTML = `
        ${ctaPrimary.href ? `<a class="btn btn-primary" href="${ctaPrimary.href}">${ctaPrimary.label || ''}</a>` : ''}
        ${ctaSecondary.href ? `<a class="btn btn-outline" href="${ctaSecondary.href}">${ctaSecondary.label || ''}</a>` : ''}
      `;

      document.getElementById('story-grid').innerHTML = `
        <img src="${IMAGES.about1}" alt="ภาพทีมงานพร้อมออกเรือทะเลตรัง" loading="lazy"/>
        <img src="${IMAGES.about2}" alt="กัปตันและลูกค้าบนเรือ" loading="lazy"/>
        <img src="${IMAGES.about3}" alt="ลูกค้าสนุกกับการเล่นน้ำที่เกาะ" loading="lazy"/>
      `;

      document.getElementById('about-why-eyebrow').textContent = whySection.eyebrow || '';
      document.getElementById('about-why-title').textContent = whySection.title || '';
      document.getElementById('why-list').innerHTML = WHY_US.map((w, i) => `
        <div class="feature" style="--rd:${i*.06}s" data-reveal>
          <span class="ico">${ICONS[w.icon] || ICONS.starOutline}</span>
          <h3>${w.title}</h3>
          <p>${w.desc}</p>
        </div>
      `).join('');

      document.getElementById('about-trust').innerHTML = (ABOUT.trust || []).map(t => `
        <div class="trust-cell"><strong>${t.value}</strong><span>${t.label}</span></div>
      `).join('');

      document.getElementById('about-office-eyebrow').textContent = office.eyebrow || '';
      document.getElementById('about-office-title').textContent = office.title || '';
      document.getElementById('about-office-info-title').textContent = office.infoTitle || '';
      document.getElementById('about-office-info-text').textContent = office.infoText || '';
      document.getElementById('about-map').src = window.TT?.SITE?.mapEmbed || '';
      const aboutSite = window.TT?.SITE || {};
      document.getElementById('about-contact-list').innerHTML = `
        <li><span class="ico" data-icon="map"></span><span><strong>ที่ตั้งออฟฟิศ</strong><span>${aboutSite.addressFull || aboutSite.address || ''}</span></span></li>
        <li><span class="ico" data-icon="clock"></span><span><strong>เวลาทำการ</strong><span>${aboutSite.hours || ''}</span></span></li>
        <li><span class="ico" data-icon="phone"></span><span><strong>โทรหาเรา</strong><span><a href="tel:${(aboutSite.phone || '').replace(/\D/g, '')}">${aboutSite.phone || aboutSite.phoneDisplay || ''}</a></span></span></li>
        <li><span class="ico" data-icon="line"></span><span><strong>LINE Official</strong><span><a href="${aboutSite.lineUrl || '#'}" target="_blank" rel="noopener">${aboutSite.lineId || ''}</a></span></span></li>
      `;

      document.getElementById('about-cta-title').textContent = cta.title || '';
      document.getElementById('about-cta-lead').textContent = cta.lead || '';
      document.getElementById('about-cta-buttons').innerHTML = `
        <a class="btn btn-line btn-lg" href="${SITE.lineUrl || '#'}" target="_blank" rel="noopener"><span data-icon="line"></span>${cta.lineLabel || 'คุยกับเรา'}</a>
        <a class="btn btn-ghost btn-lg" href="booking.html">${cta.bookingLabel || 'เริ่มจองเรือ'}</a>
      `;

      window.TT.injectIcons();
      window.TT.bindReveal();
    });
  </script>
</body>
</html>
