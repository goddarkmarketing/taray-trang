<!doctype html>
<html lang="th">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title id="page-title">แพ็กเกจ | Talay Trang</title>
  <meta name="description" id="page-desc" content="รายละเอียดแพ็กเกจเที่ยวทะเลตรัง ไปเช้าเย็นกลับ" />
  <meta name="theme-color" content="#0277bd" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link rel="preconnect" href="https://images.pexels.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+Thai+Looped:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="assets/css/fonts.css" />
  <link rel="stylesheet" href="assets/css/style.css" />
</head>
<body data-tt-page="program">
  <div id="site-header"></div>

  <main class="pkg-detail" id="pkg-root">
    <div class="container">
      <a href="programs.html" class="pkg-back" id="pkg-back">
        <svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M19 12H5M11 5l-7 7 7 7"/></svg>
        กลับสู่โปรแกรมทั้งหมด
      </a>

      <div class="pkg-gallery-wrap" id="pkg-gallery"></div>

      <div class="pkg-meta-bar" id="pkg-meta-bar"></div>

      <div class="pkg-body">
        <div class="pkg-col-itinerary">
          <div class="pkg-itinerary-panel">
            <header class="pkg-info-head">
              <span class="pkg-info-eyebrow">ตารางเดินทาง</span>
              <h3>โปรแกรมทัวร์</h3>
            </header>
            <ol class="pkg-steps" id="pkg-itinerary"></ol>
          </div>
          <div class="pkg-action" id="pkg-action"></div>
        </div>

        <div class="pkg-col-info">
          <aside class="pkg-info-panel" id="pkg-info-panel"></aside>
        </div>
      </div>

      <div class="pkg-warning" id="pkg-warning"></div>
    </div>
  </main>

  <div id="site-footer"></div>

  <script>document.write('<script src="assets/js/tt-cache-version.js?t='+Date.now()+'"><\/script>');</script>
  <script>document.write('<script src="assets/js/data-fallback.js?v='+(encodeURIComponent(window.__TT_SCRIPT_V||Date.now()))+'"><\/script>');</script>
  <script>document.write('<script src="assets/js/data.js?v='+(encodeURIComponent(window.__TT_SCRIPT_V||Date.now()))+'"><\/script>');</script>
  <script>document.write('<script src="assets/js/main.js?v='+(encodeURIComponent(window.__TT_SCRIPT_V||Date.now()))+'"><\/script>');</script>
  <script>
    document.addEventListener('DOMContentLoaded', () => {
      const { PROGRAMS, PACKAGES_2D1N, PACKAGES_3D2N, ICONS, IMAGES } = window.TT;
      const fmt = new Intl.NumberFormat('th-TH');
      const allPackages = [...PROGRAMS, ...(PACKAGES_2D1N || []), ...(PACKAGES_3D2N || [])];
      const params = new URLSearchParams(location.search);
      const id = params.get('id') || (allPackages[0] && allPackages[0].id);
      const p = allPackages.find(x => x.id === id);

      const esc = (s) => String(s ?? '')
        .replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/"/g, '&quot;');

      const INCLUSION_MAP = {
        boat:       { label: 'เรือนำเที่ยว',       icon: 'longtail' },
        food:       { label: 'อาหารบุฟเฟ่ต์',      icon: 'cutlery' },
        guide:      { label: 'พนักงานนำเที่ยว',    icon: 'users' },
        snorkel:    { label: 'อุปกรณ์ดำน้ำตื้น',   icon: 'scuba' },
        park:       { label: 'ค่าเข้าอุทยาน',      icon: 'ticket' },
        insurance:  { label: 'ประกันอุบัติเหตุ',   icon: 'shield' },
        coffee:     { label: 'กาแฟ',               icon: 'cutlery' },
        snack:      { label: 'ของว่าง',            icon: 'cutlery' },
        lifejacket: { label: 'เสื้อชูชีพ',         icon: 'shield' },
        hotel:      { label: 'ที่พัก',             icon: 'bed' },
        shuttle:    { label: 'รถรับส่ง',           icon: 'car' },
      };
      const DEFAULT_INCLUSIONS = ['boat', 'food', 'guide', 'snorkel', 'park', 'insurance', 'coffee', 'snack', 'lifejacket'];

      /** Map inclusion key or Thai label → { label, icon } */
      function resolveInclusion(item) {
        if (item && typeof item === 'object' && item.label) {
          return {
            label: item.label,
            icon: item.icon || 'info',
          };
        }
        if (INCLUSION_MAP[item]) {
          const m = INCLUSION_MAP[item];
          return { label: m.label, icon: m.icon };
        }
        const text = String(item ?? '');
        const rules = [
          [/เรือทัวร์|เรือใหญ่/, 'bigBoat'],
          [/เรือหางยาว|เรือกลับฝั่ง/, 'longtail'],
          [/เรือสปีด|speedboat/i, 'speedboat'],
          [/เรือ/, 'longtail'],
          [/อาหาร|บุฟเฟ|กาแฟ|ของว่าง|น้ำดื่ม|น้ำแข็ง|มื้อเช้า|มื้อเที่ยง/, 'cutlery'],
          [/ห้องพัก|ที่พัก|โรงแรม|พัก/, 'bed'],
          [/รถ|รับส่ง|รับลูกค้า/, 'car'],
          [/ไกด์|สตาฟ|มัคคุเทศ|พนักงาน/, 'users'],
          [/ดำน้ำ|หน้ากาก|เสื้อชู|อุปกรณ์/, 'scuba'],
          [/อุทยาน|ธรรมเนียม/, 'ticket'],
          [/ประกัน/, 'shield'],
        ];
        for (const [re, icon] of rules) {
          if (re.test(text)) return { label: text, icon };
        }
        return { label: text, icon: 'info' };
      }

      if (!p) {
        document.getElementById('pkg-root').innerHTML = '<div class="container" style="padding:120px 0;text-align:center"><h1>ไม่พบแพ็กเกจ</h1><p><a href="programs.html">กลับไปหน้าโปรแกรม</a></p></div>';
        return;
      }

      const gallery = (p.gallery && p.gallery.length) ? p.gallery.slice(0, 6)
        : [p.image, p.image, p.image, p.image, p.image, p.image].map((src, i) => src || IMAGES.heroPrograms);
      while (gallery.length < 6) gallery.push(gallery[gallery.length - 1] || p.image);

      const caption = p.galleryCaption || p.route || (p.stops || []).join(' ');
      const licenseNo = p.licenseNo || '43/00540';
      const code = p.packageCode ? `รหัส ${p.packageCode}` : `รหัส #${allPackages.indexOf(p) + 1}`;

      const STOP_DETAILS = {
        'เกาะมุก': 'เทียบท่าเกาะมุก เตรียมอุปกรณ์ว่ายน้ำและเริ่มออกเดินทางสู่จุดแรกของทริป',
        'ถ้ำมรกต': 'ว่ายน้ำผ่านถ้ำยาวเข้าสู่หาดในถ้ำ ชม Unseen Thailand และถ่ายรูปวิวสุดประทับใจ',
        'เกาะกระดาน': 'พักผ่อนหาดทรายขาว ว่ายน้ำเล่นน้ำทะเลใส และรับประทานอาหารกลางวันบนเรือ',
        'เกาะเชือก': 'ดำน้ำตื้นชมปะการังหลากสี ฝูงปลา และจุดถ่ายรูปใต้น้ำ',
        'เกาะแหวน': 'แวะดำน้ำชมปะการังและฝูงปลารอบเกาะแหวน',
        'รับลูกค้า': 'รับลูกค้าตามจุดนัดพบในเขตเมืองตรัง (เพิ่มค่าบริการตามเงื่อนไข)',
        'ท่าเรือปากเมง': 'ลูกค้าเจอกันที่ท่าเรือปากเมง อำเภอสิเกา ก่อนออกเดินทาง',
        'กลับท่าเรือ': 'เดินทางกลับท่าเรือปากเมง อาบน้ำเปลี่ยนเสื้อผ้า และจบโปรแกรม',
      };
      const DEFAULT_TIMES = ['07:00', '09:30', '11:30', '13:30', '15:30', '16:30'];

      function stopDetail(stop, i, total) {
        if (STOP_DETAILS[stop]) return STOP_DETAILS[stop];
        if (i === 0) return `เริ่มต้นกิจกรรมที่${stop} — ${p.duration || 'ทริปเต็มวัน'}`;
        if (i === total - 1) return `แวะ${stop} และเดินทางกลับจบโปรแกรม`;
        return `แวะ${stop} — สัมผัสวิวทะเลและกิจกรรมตามจุด`;
      }

      function enrichItineraryItem(item, i, total) {
        const time = item.time || DEFAULT_TIMES[i] || '07:00';
        let title = (item.title || '').trim();
        let text = (item.text || item.desc || '').trim();
        if (title && text && title === text) text = stopDetail(title, i, total);
        if (!title && text) {
          const short = text.length <= 36 && !text.includes(' ');
          title = short ? text : text.split(/[—–-]/)[0].trim().slice(0, 40);
          if (!short && title === text) text = stopDetail(title, i, total);
          else if (!short) text = text;
          else text = stopDetail(text, i, total);
        }
        if (title && !text) text = stopDetail(title, i, total);
        return { time, title: title || `ขั้นตอนที่ ${i + 1}`, text };
      }

      const rawItinerary = (p.itinerary && p.itinerary.length) ? p.itinerary
        : (p.stops || []).map((stop, i) => ({
            time: DEFAULT_TIMES[i] || `${String(7 + i * 2).padStart(2, '0')}:00`,
            title: stop,
            text: '',
          }));
      const itinerary = rawItinerary.map((item, i) => enrichItineraryItem(item, i, rawItinerary.length));

      const season = p.season || 'ตั้งแต่ 1 ตุลาคม – 31 พฤษภาคม ออกเดินทางทุกวัน ตั้งแต่ 2 ท่านขึ้นไป';
      const inclusions = (p.inclusions && p.inclusions.length) ? p.inclusions : DEFAULT_INCLUSIONS;
      const childPrice = p.childPrice != null && p.childPrice !== '' ? Number(p.childPrice) : Math.round(p.basePrice * 0.74);
      const priceMeeting = p.priceMeetingNote || 'ราคานี้เจอกันที่ท่าเรือปากเมง';
      const pickupFee = p.pickupSurcharge != null && p.pickupSurcharge !== '' ? Number(p.pickupSurcharge) : 200;
      const priceNotes = (p.priceNotes && p.priceNotes.length) ? p.priceNotes : [
        'เด็กเล็ก (อายุ 1–2.99 ปี) ฟรี',
        'เด็ก (อายุ 3–11.99 ปี)',
        'ผู้ใหญ่ (อายุ 12 ปีขึ้นไป)',
      ];
      const warning = p.warning || 'โปรแกรมอาจเปลี่ยนแปลงตามสภาพอากาศและกระแสน้ำ ลูกค้าสามารถเลื่อนวันเดินทางได้โดยแจ้งล่วงหน้า 7 วัน ไม่มีการคืนเงิน';

      document.getElementById('page-title').textContent = `${p.name} | Talay Trang`;
      document.getElementById('page-desc').setAttribute('content', p.desc || p.route || p.name);

      const topRow = gallery.slice(0, 3).map(src => `<div class="pkg-gallery-cell"><img src="${esc(src)}" alt="" loading="lazy"/></div>`).join('');
      const botRow = gallery.slice(3, 6).map(src => `<div class="pkg-gallery-cell"><img src="${esc(src)}" alt="" loading="lazy"/></div>`).join('');
      document.getElementById('pkg-gallery').innerHTML = `
        <div class="pkg-gallery">
          <div class="pkg-gallery-row">${topRow}</div>
          <div class="pkg-gallery-band"><span>${esc(caption)}</span></div>
          <div class="pkg-gallery-row">${botRow}</div>
        </div>`;

      document.getElementById('pkg-meta-bar').innerHTML = `
        <span class="pkg-license">ใบอนุญาตนำเที่ยวที่ ${esc(licenseNo)}</span>
        <span class="pkg-code">${esc(code)}</span>`;

      document.getElementById('pkg-itinerary').innerHTML = itinerary.map((item, i) => `
        <li class="pkg-step">
          <div class="pkg-step-rail" aria-hidden="true">
            <span class="pkg-step-dot"></span>
            ${i < itinerary.length - 1 ? '<span class="pkg-step-line"></span>' : ''}
          </div>
          <article class="pkg-step-card">
            <div class="pkg-step-meta">
              <span class="pkg-step-num">${String(i + 1).padStart(2, '0')}</span>
              <time class="pkg-step-time">${esc(item.time)}</time>
            </div>
            <h4 class="pkg-step-title">${esc(item.title)}</h4>
            <p class="pkg-step-desc">${esc(item.text)}</p>
          </article>
        </li>`).join('');

      const bookingUrl = `booking.html?program=${encodeURIComponent(p.id)}&step=boat`;

      document.getElementById('pkg-action').innerHTML = `
        <section class="pkg-purchase">
          <header class="pkg-info-head">
            <span class="pkg-info-eyebrow">พร้อมจองแล้ว</span>
            <h3>เลือกซื้อแพ็กเกจนี้</h3>
          </header>
          <div class="pkg-purchase-prices">
            <div class="pkg-purchase-price-row is-adult">
              <span class="pkg-purchase-price-label">ผู้ใหญ่</span>
              <div class="pkg-purchase-price-value">
                <strong>฿${fmt.format(p.basePrice)}</strong>
                <span>/ ท่าน</span>
              </div>
            </div>
            <div class="pkg-purchase-price-row is-child">
              <span class="pkg-purchase-price-label">เด็ก (3–11 ปี)</span>
              <div class="pkg-purchase-price-value">
                <strong>฿${fmt.format(childPrice)}</strong>
                <span>/ ท่าน</span>
              </div>
            </div>
          </div>
          <p class="pkg-purchase-lead">กดเลือกซื้อ → ระบุจำนวนผู้ใหญ่และเด็กในขั้นตอนจอง → ระบบคำนวณยอดให้อัตโนมัติ</p>
          <a class="btn btn-primary btn-lg pkg-purchase-btn" href="${bookingUrl}">
            <svg class="pkg-purchase-icon" viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M3 3h2l2 12h12l2-9H6"/><circle cx="9" cy="20" r="1.6"/><circle cx="18" cy="20" r="1.6"/></svg>
            เลือกซื้อแพ็กเกจนี้
          </a>
        </section>`;

      const inclusionHtml = inclusions.map((item) => {
        const inc = resolveInclusion(item);
        return `<li class="pkg-inc-tile">
          <span class="pkg-inc-icon">${ICONS[inc.icon] || ICONS.info}</span>
          <span class="pkg-inc-label">${esc(inc.label)}</span>
        </li>`;
      }).join('');

      const noteHtml = priceNotes.map(n => `
        <li class="pkg-note-item">
          <span class="pkg-note-check">${ICONS.check}</span>
          <span>${esc(n)}</span>
        </li>`).join('');

      document.getElementById('pkg-info-panel').innerHTML = `
        <section class="pkg-info-block">
          <header class="pkg-info-head">
            <span class="pkg-info-eyebrow">ช่วงเวลา</span>
            <h3>พร้อมออกเดินทาง</h3>
          </header>
          <div class="pkg-season-card">
            <span class="pkg-season-icon">${ICONS.clock}</span>
            <p>${esc(season)}</p>
          </div>
        </section>

        <section class="pkg-info-block">
          <header class="pkg-info-head">
            <span class="pkg-info-eyebrow">ครบในที่เดียว</span>
            <h3>สิ่งที่รวมในแพ็กเกจ</h3>
          </header>
          <ul class="pkg-inc-grid">${inclusionHtml}</ul>
        </section>

        <section class="pkg-info-block">
          <header class="pkg-info-head">
            <span class="pkg-info-eyebrow">เงื่อนไขราคา</span>
            <h3>หมายเหตุ</h3>
          </header>
          <ul class="pkg-note-list">${noteHtml}</ul>
        </section>

        <section class="pkg-info-block pkg-info-block--price">
          <header class="pkg-info-head">
            <span class="pkg-info-eyebrow">ราคาเริ่มต้น</span>
            <h3>ค่าบริการต่อท่าน</h3>
          </header>
          <div class="pkg-price-card">
            <div class="pkg-price-row">
              <div class="pkg-price-item is-adult">
                <span class="pkg-price-tag">ผู้ใหญ่</span>
                <div class="pkg-price-amount">
                  <strong>${fmt.format(p.basePrice)}</strong>
                  <span>บาท</span>
                </div>
              </div>
              <div class="pkg-price-sep" aria-hidden="true"></div>
              <div class="pkg-price-item is-child">
                <span class="pkg-price-tag">เด็ก</span>
                <div class="pkg-price-amount">
                  <strong>${fmt.format(childPrice)}</strong>
                  <span>บาท</span>
                </div>
              </div>
            </div>
            <div class="pkg-price-meta">
              <p class="pkg-price-note">${esc(priceMeeting)}</p>
              <p class="pkg-price-pickup">
                <span class="pkg-price-pill">รับในเมือง +${fmt.format(pickupFee)} บาท/ท่าน</span>
              </p>
            </div>
          </div>
        </section>`;

      document.getElementById('pkg-warning').innerHTML = `
        <span class="pkg-warning-icon" aria-hidden="true">⚠</span>
        <p>${esc(warning)}</p>`;

    });
  </script>
</body>
</html>
