<body data-tt-page="program">
  <div id="site-header"></div>

  <main class="pkg-detail" id="pkg-root">
    <div class="container">
      <a href="programs.html" class="pkg-back" id="pkg-back">
        <svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M19 12H5M11 5l-7 7 7 7"/></svg>
        กลับสู่โปรแกรมทั้งหมด
      </a>

      <div class="pkg-gallery-wrap" id="pkg-gallery"></div>

      <div class="pkg-meta-bar" id="pkg-meta-bar"></div>

      <div class="pkg-body">
        <div class="pkg-col-itinerary">
          <div class="pkg-itinerary-panel">
            <header class="pkg-info-head">
              <span class="pkg-info-eyebrow">ตารางเดินทาง</span>
              <h3>โปรแกรมทัวร์</h3>
            </header>
            <ol class="pkg-steps" id="pkg-itinerary"></ol>
          </div>
          <div class="pkg-action" id="pkg-action"></div>
        </div>

        <div class="pkg-col-info">
          <aside class="pkg-info-panel" id="pkg-info-panel"></aside>
        </div>
      </div>

      <div class="pkg-warning" id="pkg-warning"></div>
    </div>
  </main>

  <div id="site-footer"></div>

  <script>document.write('<script src="assets/js/tt-cache-version.js?t='+Date.now()+'"><\/script>');</script>
  <script>document.write('<script src="assets/js/data-fallback.js?v='+(encodeURIComponent(window.__TT_SCRIPT_V||Date.now()))+'"><\/script>');</script>
  <script>document.write('<script src="assets/js/data.js?v='+(encodeURIComponent(window.__TT_SCRIPT_V||Date.now()))+'"><\/script>');</script>
  <script>document.write('<script src="assets/js/main.js?v='+(encodeURIComponent(window.__TT_SCRIPT_V||Date.now()))+'"><\/script>');</script>
  <script>
    const ALERT_ICON = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M12 9v4M12 17h.01"/><path d="M10.29 3.86 1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0Z"/></svg>';

    function renderProgramPage() {
      const { PROGRAMS, PACKAGES_2D1N, PACKAGES_3D2N, PACKAGES_4D3N, ICONS, IMAGES } = window.TT || {};
      if (!PROGRAMS && !PACKAGES_2D1N && !PACKAGES_3D2N && !PACKAGES_4D3N) return;
      const alertIcon = ICONS?.alert || ALERT_ICON;
      const fmt = new Intl.NumberFormat('th-TH');
      const allPackages = [...PROGRAMS, ...(PACKAGES_2D1N || []), ...(PACKAGES_3D2N || []), ...(PACKAGES_4D3N || [])];
      const params = new URLSearchParams(location.search);
      const id = params.get('id') || (allPackages[0] && allPackages[0].id);
      const p = allPackages.find(x => x.id === id);

      const esc = (s) => String(s ?? '')
        .replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/"/g, '&quot;');

      const INCLUSION_MAP = {
        boat:       { label: 'เรือนำเที่ยว',       icon: 'longtail' },
        food:       { label: 'อาหารบุฟเฟ่ต์',      icon: 'cutlery' },
        guide:      { label: 'พนักงานนำเที่ยว',    icon: 'users' },
        snorkel:    { label: 'อุปกรณ์ดำน้ำตื้น',   icon: 'scuba' },
        park:       { label: 'ค่าเข้าอุทยาน',      icon: 'ticket' },
        insurance:  { label: 'ประกันอุบัติเหตุ',   icon: 'shield' },
        coffee:     { label: 'กาแฟ',               icon: 'cutlery' },
        snack:      { label: 'ของว่าง',            icon: 'cutlery' },
        lifejacket: { label: 'เสื้อชูชีพ',         icon: 'shield' },
        hotel:      { label: 'ที่พัก',             icon: 'bed' },
        shuttle:    { label: 'รถรับส่ง',           icon: 'car' },
      };
      const DEFAULT_INCLUSIONS = ['boat', 'food', 'guide', 'snorkel', 'park', 'insurance', 'coffee', 'snack', 'lifejacket'];

      /** Map inclusion key or Thai label → { label, icon } */
      function resolveInclusion(item) {
        if (item && typeof item === 'object' && item.label) {
          return {
            label: item.label,
            icon: item.icon || 'info',
          };
        }
        if (INCLUSION_MAP[item]) {
          const m = INCLUSION_MAP[item];
          return { label: m.label, icon: m.icon };
        }
        const text = String(item ?? '');
        const rules = [
          [/เรือทัวร์|เรือใหญ่/, 'bigBoat'],
          [/เรือหางยาว|เรือกลับฝั่ง/, 'longtail'],
          [/เรือสปีด|speedboat/i, 'speedboat'],
          [/เรือ/, 'longtail'],
          [/อาหาร|บุฟเฟ|กาแฟ|ของว่าง|น้ำดื่ม|น้ำแข็ง|มื้อเช้า|มื้อเที่ยง/, 'cutlery'],
          [/ห้องพัก|ที่พัก|โรงแรม|พัก/, 'bed'],
          [/รถ|รับส่ง|รับลูกค้า/, 'car'],
          [/ไกด์|สตาฟ|มัคคุเทศ|พนักงาน/, 'users'],
          [/ดำน้ำ|หน้ากาก|เสื้อชู|อุปกรณ์/, 'scuba'],
          [/อุทยาน|ธรรมเนียม/, 'ticket'],
          [/ประกัน/, 'shield'],
        ];
        for (const [re, icon] of rules) {
          if (re.test(text)) return { label: text, icon };
        }
        return { label: text, icon: 'info' };
      }

      if (!p) {
        document.getElementById('pkg-root').innerHTML = '<div class="container" style="padding:120px 0;text-align:center"><h1>ไม่พบแพ็กเกจ</h1><p><a href="programs.html">กลับไปหน้าโปรแกรม</a></p></div>';
        return;
      }

      const gallery = (p.gallery && p.gallery.length) ? p.gallery.slice(0, 6)
        : [p.image, p.image, p.image, p.image, p.image, p.image].map((src, i) => src || IMAGES.heroPrograms);
      while (gallery.length < 6) gallery.push(gallery[gallery.length - 1] || p.image);

      const caption = p.galleryCaption || p.route || (p.stops || []).join(' ');
      const licenseNo = p.licenseNo || '43/00540';
      const code = p.packageCode ? `รหัส ${p.packageCode}` : `รหัส #${allPackages.indexOf(p) + 1}`;

      const STOP_DETAILS = {
        'เกาะมุก': 'เทียบท่าเกาะมุก เตรียมอุปกรณ์ว่ายน้ำและเริ่มออกเดินทางสู่จุดแรกของทริป',
        'ถ้ำมรกต': 'ว่ายน้ำผ่านถ้ำยาวเข้าสู่หาดในถ้ำ ชม Unseen Thailand และถ่ายรูปวิวสุดประทับใจ',
        'เกาะกระดาน': 'พักผ่อนหาดทรายขาว ว่ายน้ำเล่นน้ำทะเลใส และรับประทานอาหารกลางวันบนเรือ',
        'เกาะเชือก': 'ดำน้ำตื้นชมปะการังหลากสี ฝูงปลา และจุดถ่ายรูปใต้น้ำ',
        'เกาะแหวน': 'แวะดำน้ำชมปะการังและฝูงปลารอบเกาะแหวน',
        'รับลูกค้า': 'รับลูกค้าตามจุดนัดพบในเขตเมืองตรัง (เพิ่มค่าบริการตามเงื่อนไข)',
        'ท่าเรือปากเมง': 'ลูกค้าเจอกันที่ท่าเรือปากเมง อำเภอสิเกา ก่อนออกเดินทาง',
        'กลับท่าเรือ': 'เดินทางกลับท่าเรือปากเมง อาบน้ำเปลี่ยนเสื้อผ้า และจบโปรแกรม',
      };
      const DEFAULT_TIMES = ['07:00', '09:30', '11:30', '13:30', '15:30', '16:30'];

      function stopDetail(stop, i, total) {
        if (STOP_DETAILS[stop]) return STOP_DETAILS[stop];
        if (i === 0) return `เริ่มต้นกิจกรรมที่${stop} — ${p.duration || 'ทริปเต็มวัน'}`;
        if (i === total - 1) return `แวะ${stop} และเดินทางกลับจบโปรแกรม`;
        return `แวะ${stop} — สัมผัสวิวทะเลและกิจกรรมตามจุด`;
      }

      function enrichItineraryItem(item, i, total) {
        const time = item.time || DEFAULT_TIMES[i] || '07:00';
        let title = (item.title || '').trim();
        let text = (item.text || item.desc || '').trim();
        if (title && text && title === text) text = stopDetail(title, i, total);
        if (!title && text) {
          const short = text.length <= 36 && !text.includes(' ');
          title = short ? text : text.split(/[—–-]/)[0].trim().slice(0, 40);
          if (!short && title === text) text = stopDetail(title, i, total);
          else if (!short) text = text;
          else text = stopDetail(text, i, total);
        }
        if (title && !text) text = stopDetail(title, i, total);
        return { time, title: title || `ขั้นตอนที่ ${i + 1}`, text };
      }

      const rawItinerary = (p.itinerary && p.itinerary.length) ? p.itinerary
        : (p.stops || []).map((stop, i) => ({
            time: DEFAULT_TIMES[i] || `${String(7 + i * 2).padStart(2, '0')}:00`,
            title: stop,
            text: '',
          }));
      const itinerary = rawItinerary.map((item, i) => enrichItineraryItem(item, i, rawItinerary.length));

      function parseItineraryDay(title) {
        const m = (title || '').match(/วันที่\s*(\d+)/);
        return m ? parseInt(m[1], 10) : null;
      }
      function stripDayPrefix(title) {
        const stripped = (title || '').replace(/^วันที่\s*\d+\s*[·•\-–—]\s*/, '').trim();
        return stripped || title;
      }
      const TIME_LAYER_LABELS = {
        1: 'ช่วงเช้า',
        2: 'ก่อนเที่ยง',
        3: 'ช่วงบ่าย',
        4: 'ช่วงเย็น',
      };
      function timeLayer(time) {
        const h = parseInt(String(time || '12:00').split(':')[0], 10);
        if (Number.isNaN(h)) return 1;
        if (h < 9) return 1;
        if (h < 12) return 2;
        if (h < 15) return 3;
        return 4;
      }
      function assignItineraryLayers(items) {
        let currentDay = 1;
        const hasDayLabels = items.some((item) => /วันที่\s*\d+/.test(item.title));
        const daySet = new Set();
        items.forEach((item) => {
          const parsed = parseItineraryDay(item.title);
          if (parsed != null) daySet.add(parsed);
        });
        const isMultiDay = hasDayLabels && daySet.size > 1;
        return items.map((item) => {
          const parsed = parseItineraryDay(item.title);
          if (parsed != null) currentDay = parsed;
          const layer = isMultiDay ? currentDay : timeLayer(item.time);
          const bandLabel = isMultiDay ? `วันที่ ${layer}` : (TIME_LAYER_LABELS[layer] || `ช่วงที่ ${layer}`);
          return { ...item, layer, bandLabel, isMultiDay };
        });
      }
      const itineraryLayers = assignItineraryLayers(itinerary);
      const BAND_ICONS = {
        time: { 1: 'sun', 2: 'clock', 3: 'compass', 4: 'moon' },
      };
      function bandIcon(layer, isMultiDay) {
        if (isMultiDay) return ICONS.calendar || ICONS.clock;
        const key = BAND_ICONS.time[layer] || 'clock';
        return ICONS[key] || ICONS.clock;
      }

      const isPkg2d1n = (PACKAGES_2D1N || []).some((x) => x.id === p.id);
      const isPkg3d2n = (PACKAGES_3D2N || []).some((x) => x.id === p.id);
      const isPkg4d3n = (PACKAGES_4D3N || []).some((x) => x.id === p.id);

      function splitMealCombo(text) {
        const s = String(text).trim();
        const m = s.match(/^(.+?)\s*[·•]\s*(อาหารเช้า.+)$/i);
        if (!m) return null;
        return { lunch: m[1].trim(), breakfast: m[2].trim() };
      }

      function buildInclusionsByDay(pkg) {
        if (pkg.inclusionsByDay && pkg.inclusionsByDay.length) {
          return pkg.inclusionsByDay.map((block) => ({
            day: block.day,
            label: block.label || `วันที่ ${block.day}`,
            items: block.items || [],
          }));
        }
        if (!isPkg2d1n && !isPkg3d2n && !isPkg4d3n) return null;

        const raw = (pkg.inclusions && pkg.inclusions.length) ? pkg.inclusions : DEFAULT_INCLUSIONS;
        const dayCount = isPkg4d3n ? 4 : isPkg3d2n ? 3 : 2;
        const days = Array.from({ length: dayCount }, (_, i) => ({
          day: i + 1,
          label: `วันที่ ${i + 1}`,
          items: [],
        }));
        const put = (day, item) => {
          if (!item) return;
          const d = days[day - 1];
          if (d && !d.items.includes(item)) d.items.push(item);
        };

        const isDay1Only = (t) => /วันที่\s*1|ตุ๊กตุ๊กนำเที่ยววันที่\s*1|รับจากสนามบิน|รถตุ๊กตุ๊กนำเที่ยว/.test(t);
        const isDay3Only = (t) => /วันที่\s*3|city tour\s*วันที่\s*3|city tour/i.test(t) && /วันที่\s*3|city tour/i.test(t);
        const isBreakfast = (t) => /อาหารเช้า/.test(t);
        const isReturn = (t) => /กลับฝั่ง|กลับท่า|เรือกลับ|เรือหางยาวกลับ/.test(t);
        const isHotel = (t) => /ห้องพัก|ที่พัก|ค่าที่พัก/.test(t);
        const isSeaDay = (t) => /เรือ|อาหารเที่ยง|อาหารกลาง|บุฟเฟ่ต์|ดำน้ำ|อุปกรณ์|ไกด์|สตาฟ|มัคคุเทศ|อุทยาน|ประกัน|กาแฟ|ว่าง|น้ำดื่ม|น้ำแข็ง|รับลูกค้า|รถตู้รับส่งวันเที่ยว|รถรับส่งในเมือง/.test(t);

        for (const item of raw) {
          const text = String(item);
          const t = text.toLowerCase();
          const combo = splitMealCombo(text);

          if (combo) {
            const lunchDay = isPkg3d2n ? 2 : 1;
            const breakfastMatch = combo.breakfast.match(/(\d+)\s*มื้อ/);
            const breakfastCount = breakfastMatch ? parseInt(breakfastMatch[1], 10) : 1;
            put(lunchDay, combo.lunch);
            if (isPkg3d2n && breakfastCount >= 2) {
              put(2, 'อาหารเช้า 1 มื้อ');
              put(3, 'อาหารเช้า 1 มื้อ');
            } else {
              put(isPkg3d2n ? 3 : 2, combo.breakfast);
            }
            continue;
          }

          if (isPkg3d2n) {
            if (isDay1Only(text)) { put(1, text); continue; }
            if (/รถตู้\s*city tour/i.test(text)) { put(3, text); continue; }
            if (isDay3Only(text)) { put(3, text); continue; }
            if (isBreakfast(text)) { put(3, text); continue; }
            if (isReturn(text)) { put(3, text); continue; }
            if (/ห้องพัก\s*2\s*คืน|ที่พัก\s*2\s*คืน|ค่าที่พัก\s*2/.test(t)) {
              put(1, text.replace(/\s*2\s*คืน/, ' · เช็กอิน'));
              put(2, 'พักต่อที่ที่พัก');
              continue;
            }
            if (/เกาะไหง\s*2\s*คืน/.test(t)) {
              put(1, text);
              put(2, 'พักผ่อนบนเกาะไหง');
              continue;
            }
            if (isHotel(text)) { put(1, text); continue; }
            if (/รถตู้รับส่ง/.test(t) && !/city tour/i.test(t)) { put(2, text); continue; }
            if (isSeaDay(t) || /เกาะรอก|สปีดโบ/.test(t)) { put(2, text); continue; }
            put(2, text);
            continue;
          }

          if (isBreakfast(text)) { put(2, text); continue; }
          if (isReturn(text)) { put(2, text); continue; }
          put(1, text);
        }

        if (isPkg2d1n && days[1].items.length === 0) {
          days[1].items.push('พักผ่อนที่ที่พัก · เช็กเอาท์ตามเวลา');
        }
        if (isPkg3d2n && days[2].items.length === 0) {
          days[2].items.push('เช็กเอาท์ · เดินทางกลับตามโปรแกรม');
        }
        if (isPkg4d3n && days[3].items.length === 0) {
          days[3].items.push('เช็กเอาท์ · เดินทางกลับตามโปรแกรม');
        }

        return days.filter((block) => block.items.length > 0);
      }

      function renderInclusionTile(item) {
        const inc = resolveInclusion(item);
        return `<li class="pkg-inc-tile">
          <span class="pkg-inc-icon">${ICONS[inc.icon] || ICONS.info}</span>
          <span class="pkg-inc-label">${esc(inc.label)}</span>
        </li>`;
      }

      function renderInclusionsSection(pkg, flatInclusions) {
        const byDay = buildInclusionsByDay(pkg);
        if (!byDay) {
          return `<ul class="pkg-inc-grid">${flatInclusions.map(renderInclusionTile).join('')}</ul>`;
        }
        const tabs = byDay.map((block, i) => `
            <button type="button" class="pkg-inc-tab pkg-inc-tab--${block.day}${i === 0 ? ' is-active' : ''}" role="tab" aria-selected="${i === 0 ? 'true' : 'false'}" data-day="${block.day}" id="pkg-inc-tab-${block.day}">
              <span class="pkg-inc-tab-icon">${bandIcon(block.day, true)}</span>
              <span>${esc(block.label)}</span>
            </button>`).join('');
        const panels = byDay.map((block, i) => `
            <div class="pkg-inc-panel${i === 0 ? ' is-active' : ''}" role="tabpanel" data-day="${block.day}" id="pkg-inc-panel-${block.day}" aria-labelledby="pkg-inc-tab-${block.day}"${i === 0 ? '' : ' hidden'}>
              <ul class="pkg-inc-grid pkg-inc-grid--day">${block.items.map(renderInclusionTile).join('')}</ul>
            </div>`).join('');
        return `
          <div class="pkg-inc-switcher" id="pkg-inc-switcher">
            <div class="pkg-inc-tabs" role="tablist" aria-label="สิ่งที่รวมแยกตามวัน">${tabs}</div>
            <div class="pkg-inc-panels">${panels}</div>
          </div>`;
      }

      function initPkgIncTabs() {
        const root = document.getElementById('pkg-inc-switcher');
        if (!root) return;
        const tabs = [...root.querySelectorAll('.pkg-inc-tab')];
        const panels = [...root.querySelectorAll('.pkg-inc-panel')];
        tabs.forEach((tab) => {
          tab.addEventListener('click', () => {
            const day = tab.dataset.day;
            tabs.forEach((t) => {
              const on = t.dataset.day === day;
              t.classList.toggle('is-active', on);
              t.setAttribute('aria-selected', on ? 'true' : 'false');
            });
            panels.forEach((panel) => {
              const on = panel.dataset.day === day;
              panel.classList.toggle('is-active', on);
              panel.hidden = !on;
            });
          });
        });
      }

      function roomPriceParts(room) {
        if (room && room.price != null && room.price > 0) {
          return { amount: `฿${fmt.format(room.price)}`, unit: '/ ท่าน', book: false };
        }
        return { amount: 'จอง', unit: '', book: true };
      }

      const WW_HOTEL = 'https://www.xn--72c1af3ci9dk0j.com/wp-content/uploads';
      const HOTEL_IMAGE_KEYS = [
        ['ชมตรัง', `${WW_HOTEL}/2019/08/ชมตรัง-min.jpg`],
        ['เมซอง', `${WW_HOTEL}/2019/08/cc78dd160a4c679e30c2776ecec2aa636_4095006_190814_0048.jpg`],
        ['ทับเที่ยง', `${WW_HOTEL}/2019/08/ณ-ทับเที่ยง-min.jpg`],
        ['อิโค่อิ', `${WW_HOTEL}/2019/08/cc78dd160a4c679e30c2776ecec2aa636_4095029_190814_0002-min-1024x683.jpg`],
        ['ไมตรี', `${WW_HOTEL}/2019/08/cc78dd160a4c679e30c2776ecec2aa636_4095010_190814_0055-min-1024x683.jpg`],
        ['ธรรมรินทร์', `${WW_HOTEL}/2019/08/cc78dd160a4c679e30c2776ecec2aa636_4094997_190814_0071-min-1024x683.jpg`],
        ['เรือรัษฎา', `${WW_HOTEL}/2019/08/Superior_sm-min-1024x683.jpg`],

            if (!btn) return;
            const input = stepper.querySelector('.qty-input');
            const dir = btn.dataset.qty === '+' ? 1 : -1;
            const min = Number(input.min) || 0;
            const max = Number(input.max) || 80;
            const cur = Number(input.value) || min;
            const next = Math.max(min, Math.min(max, cur + dir));
            if (next !== cur) {
              input.value = next;
              input.dispatchEvent(new Event('input', { bubbles: true }));
            }
          });
        });

        function setPkgError(field, msg) {
          const wrap = form.querySelector(`[data-pkg-field="${field}"]`);
          if (!wrap) return;
          wrap.classList.toggle('has-error', !!msg);
          const err = wrap.querySelector('.field-error');
          if (err) err.textContent = msg || '';
        }

        function getPkgState() {
          const fd = new FormData(form);
          const adults = Number(fd.get('adults') || 0);
          const children = Number(fd.get('children') || 0);
          return {
            name: String(fd.get('name') || '').trim(),
            phone: String(fd.get('phone') || '').trim(),
            date: String(fd.get('date') || ''),
            dateEnd: String(fd.get('date_end') || ''),
            adults,
            children,
            people: adults + children,
            note: String(fd.get('note') || '').trim(),
          };
        }

        function formatThaiDate(d) {
          if (!d) return '-';
          try {
            const dt = new Date(d + 'T12:00:00');
            const months = ['ม.ค.','ก.พ.','มี.ค.','เม.ย.','พ.ค.','มิ.ย.','ก.ค.','ส.ค.','ก.ย.','ต.ค.','พ.ย.','ธ.ค.'];
            return `${dt.getDate()} ${months[dt.getMonth()]} ${dt.getFullYear() + 543}`;
          } catch { return d; }
        }

        function getSelectedRoomInfo() {
          if (!hotelPicker) return null;
          return hotelPicker.getSelectedRoom();
        }

        function adultUnitPrice() {
          const sel = getSelectedRoomInfo();
          const room = sel?.room;
          if (room?.price != null && room.price > 0) return room.price;
          return Number(pkg.basePrice || 0);
        }

        function childUnitPrice() {
          const adult = adultUnitPrice();
          const base = Number(pkg.basePrice || 0);
          if (base > 0 && adult !== base) {
            return Math.round(childRate * adult / base);
          }
          return childRate;
        }

        function calcPkgTotal(state) {
          const sel = getSelectedRoomInfo();
          const adultPrice = adultUnitPrice();
          const childPriceUnit = childUnitPrice();
          const adultTotal = state.adults * adultPrice;
          const childTotal = state.children * childPriceUnit;
          const room = sel?.room;
          const roomQuoted = !!(room && (room.book || !(room.price > 0)));
          return {
            adultTotal,
            childTotal,
            total: adultTotal + childTotal,
            adultPrice,
            childPriceUnit,
            isBookOnly: adultPrice <= 0,
            roomQuoted,
            selection: sel,
          };
        }

        function renderPkgTotal() {
          const state = getPkgState();
          const calc = calcPkgTotal(state);
          const lines = [];
          if (state.adults > 0) {
            const adultLabel = calc.isBookOnly
              ? `ผู้ใหญ่ × ${state.adults}`
              : `ผู้ใหญ่ ${fmt.format(calc.adultPrice)} × ${state.adults}`;
            const adultSum = calc.isBookOnly ? 'จอง' : `฿${fmt.format(calc.adultTotal)}`;
            lines.push(`<div class="pkg-book-price-line"><span>${adultLabel}</span><span>${adultSum}</span></div>`);
          }
          if (state.children > 0) {
            const childLabel = calc.isBookOnly
              ? `เด็ก × ${state.children}`
              : `เด็ก ${fmt.format(calc.childPriceUnit)} × ${state.children}`;
            const childSum = calc.isBookOnly ? 'จอง' : `฿${fmt.format(calc.childTotal)}`;
            lines.push(`<div class="pkg-book-price-line"><span>${childLabel}</span><span>${childSum}</span></div>`);
          }
          if (calc.selection?.hotelName) {
            const rp = roomPriceParts(calc.selection.room);
            let priceText;
            if (rp.book) {
              priceText = calc.adultPrice > 0
                ? `~${esc(`฿${fmt.format(calc.adultPrice)}`)}/ท่าน`
                : 'จอง';
            } else {
              priceText = `${rp.amount}${rp.unit ? ` ${rp.unit}` : ''}`;
            }
            lines.push(`<div class="pkg-book-price-line is-meta"><span>${esc(calc.selection.hotelName)} · ${esc(calc.selection.roomName)}</span><span>${priceText}</span></div>`);
          }
          const linesEl = document.getElementById('pkg-book-lines');
          const totalEl = document.getElementById('pkg-book-total');
          if (linesEl) linesEl.innerHTML = lines.join('');
          if (totalEl) {
            totalEl.textContent = calc.isBookOnly ? 'จอง' : ('฿' + fmt.format(calc.total));
          }
          return { state, calc };
        }
        renderPkgTotalFn = renderPkgTotal;

        function validatePkgForm(state) {
          let ok = true;
          if (hotels?.length && !getSelectedRoomInfo()?.roomName) {
            window.TT?.toast?.('กรุณาเลือกโรงแรมและประเภทห้อง');
            ok = false;
          }
          if (!state.date) { setPkgError('date', 'กรุณาเลือกวันที่เดินทาง'); ok = false; }
          else setPkgError('date', '');
          if (!state.adults || state.adults < 1) { setPkgError('adults', 'ระบุผู้ใหญ่อย่างน้อย 1 ท่าน'); ok = false; }
          else setPkgError('adults', '');
          if (state.children < 0) { setPkgError('children', 'จำนวนเด็กไม่ถูกต้อง'); ok = false; }
          else setPkgError('children', '');
          if (!state.name) { setPkgError('name', 'กรุณากรอกชื่อ'); ok = false; }
          else setPkgError('name', '');
          const phoneClean = state.phone.replace(/\D/g, '');
          if (!state.phone || phoneClean.length < 9) {
            setPkgError('phone', state.phone ? 'เบอร์โทรไม่ถูกต้อง' : 'กรุณากรอกเบอร์โทร');
            ok = false;
          } else setPkgError('phone', '');
          return ok;
        }

        function buildPkgLineMessage(state, calc) {
          const code = pkg.packageCode ? `รหัส ${pkg.packageCode}` : `ID ${pkg.id}`;
          const L = [
            'สวัสดีครับ/ค่ะ สนใจจองแพ็กเกจทัวร์',
            '',
            '— แพ็กเกจ —',
            `${pkg.name}`,
            code,
            pkg.route ? `เส้นทาง: ${pkg.route}` : '',
            pkg.duration ? `ระยะเวลา: ${pkg.duration}` : '',
            '',
            '— ข้อมูลผู้จอง —',
            `ชื่อ: ${state.name}`,
            `เบอร์โทร: ${state.phone}`,
            `วันเริ่มเดินทาง: ${formatThaiDate(state.date)}`,
            state.dateEnd ? `วันสิ้นสุด: ${formatThaiDate(state.dateEnd)}` : '',
            `ผู้ใหญ่: ${state.adults} ท่าน`,
          ];
          if (state.children > 0) L.push(`เด็ก: ${state.children} ท่าน`);
          L.push(`รวม: ${state.people} ท่าน`);
          if (calc.selection?.hotelName) {
            L.push('');
            L.push('— ที่พัก —');
            L.push(`โรงแรม: ${calc.selection.hotelName}`);
            L.push(`ห้อง: ${calc.selection.roomName}`);
            const rp = roomPriceParts(calc.selection.room);
            if (rp.book && calc.adultPrice > 0) {
              L.push(`ราคา: ~฿${fmt.format(calc.adultPrice)}/ท่าน (เริ่มต้น · แอดมินยืนยันตามโรงแรม)`);
            } else {
              L.push(`ราคา: ${rp.amount}${rp.unit ? ' ' + rp.unit : ''}`);
            }
          }
          L.push('');
          L.push('— สรุปราคา —');
          if (calc.isBookOnly) {
            L.push('>>> ราคา: จอง (แอดมินยืนยัน) <<<');
          } else {
            if (state.adults > 0) L.push(`ผู้ใหญ่: ฿${fmt.format(calc.adultPrice)} × ${state.adults} = ฿${fmt.format(calc.adultTotal)}`);
            if (state.children > 0) L.push(`เด็ก: ฿${fmt.format(calc.childPriceUnit)} × ${state.children} = ฿${fmt.format(calc.childTotal)}`);
            L.push(`>>> รวมโดยประมาณ: ฿${fmt.format(calc.total)} <<<`);
            if (calc.roomQuoted) L.push('(ราคาโรงแรมที่เลือกอาจปรับตามช่วง · แอดมินยืนยันทาง LINE)');
          }
          if (state.note) {
            L.push('');
            L.push('— หมายเหตุ —');
            L.push(state.note);
          }
          L.push('');
          L.push('รบกวนแอดมินติดต่อกลับเพื่อยืนยันการจองด้วยครับ/ค่ะ');
          return L.filter(Boolean).join('\n');
        }

        form.querySelectorAll('input, textarea').forEach((el) => {
          el.addEventListener('input', renderPkgTotal);
          el.addEventListener('change', renderPkgTotal);
        });
        renderPkgTotal();

        document.getElementById('pkg-book-line')?.addEventListener('click', () => {
          const { state, calc } = renderPkgTotal();
          if (!validatePkgForm(state)) {
            window.TT?.toast?.('กรุณากรอกข้อมูลให้ครบ');
            return;
          }
          const msg = buildPkgLineMessage(state, calc);
          try { navigator.clipboard?.writeText(msg); } catch {}
          window.TT?.toast?.('คัดลอกข้อความแล้ว กำลังเปิด LINE…');
          window.open(lineUrl, '_blank', 'noopener');
        });

        document.getElementById('pkg-book-copy')?.addEventListener('click', () => {
          const { state, calc } = renderPkgTotal();
          if (!validatePkgForm(state)) {
            window.TT?.toast?.('กรุณากรอกข้อมูลให้ครบก่อนคัดลอก');
            return;
          }
          const msg = buildPkgLineMessage(state, calc);
          navigator.clipboard?.writeText(msg).then(
            () => window.TT?.toast?.('คัดลอกเรียบร้อย พร้อมส่งใน LINE'),
            () => window.TT?.toast?.('คัดลอกไม่สำเร็จ')
          );
        });
      }

    }

    document.addEventListener('DOMContentLoaded', renderProgramPage);
    document.addEventListener('tt:data-updated', renderProgramPage);
  </script>
</body>
</html>
