  <meta name="theme-color" content="#0277bd" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

<body data-tt-page="boat-book">
  <div id="site-header"></div>

  <section class="hero-sub hero-sub-compact">
    <div class="hero-media"><img id="hero-img" alt="จองเรือเหมาลำทะเลตรัง" /></div>
    <div class="container hero-inner" data-reveal>
      <span class="crumb"><a href="boats.html">ประเภทเรือ</a> / จองเหมาลำ</span>
      <h1 id="bb-page-title">จองเรือเหมาลำ</h1>
      <p class="lead" id="bb-page-lead">ทำตามขั้นตอนทีละสเต็ป ระบบคำนวณราคาให้อัตโนมัติ</p>
    </div>
  </section>

  <section class="section bb-section booking-section">
    <div class="container bb-container">
      <ol class="booking-progress bb-progress" id="bb-progress" aria-label="ขั้นตอนการจองเรือ"></ol>

      <div class="booking-grid bb-grid">
        <form id="bb-form" class="bb-form" novalidate>
          <div id="bb-wizard" class="bb-wizard"></div>
        </form>

        <aside class="booking-summary-wrap bb-summary-sticky">
          <div class="cart bb-cart" id="bb-cart">
            <header class="bb-cart-head">
              <span class="bb-cart-head-icon" aria-hidden="true">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 5H7a2 2 0 0 0-2 2v12a2 2 0 0 0 2 2h10a2 2 0 0 0 2-2V7a2 2 0 0 0-2-2h-2"/><rect x="9" y="3" width="6" height="4" rx="1"/><path d="M9 14l2 2 4-4"/></svg>
              </span>
              <h3>สรุปยอดรวม</h3>
            </header>
            <div class="bb-cart-body">
              <div class="bb-cart-lines" id="bb-cart-lines">
                <p class="bb-cart-empty muted-sm">ทำตามขั้นตอนเพื่อดูราคา</p>
              </div>
              <div class="cart-total bb-cart-total">
                <span class="cart-total-label">ยอดชำระสุทธิ</span>
                <strong class="cart-total-amount bb-total-amount">
                  <small>฿</small><span class="amount" id="bb-total">0</span>
                </strong>
              </div>
            </div>
          </div>
        </aside>
      </div>
    </div>
  </section>

  <div id="site-footer"></div>
