<!doctype html>
<html lang="th">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>บทความ — เคล็ดลับเที่ยวทะเลตรัง | Talay Trang</title>
  <meta name="description" content="รวมบทความและคู่มือเที่ยวทะเลตรัง — แนะนำเกาะยอดนิยม การเลือกเรือ ฤดูที่เหมาะสม และ Checklist เตรียมตัวก่อนออกเดินทาง" />
  <meta name="theme-color" content="#0277bd" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link rel="preconnect" href="https://images.pexels.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+Thai+Looped:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="assets/css/fonts.css" />
  <link rel="stylesheet" href="assets/css/style.css" />
</head>
<body data-tt-page="articles">
  <div id="site-header"></div>

  <section class="hero-sub">
    <div class="hero-media"><img id="hero-img" alt="คู่มือเที่ยวทะเลตรัง" /></div>
    <div class="container hero-inner" data-reveal>
      <span class="crumb">บทความ &amp; คู่มือ</span>
      <h1>เคล็ดลับเที่ยวทะเลตรัง</h1>
      <p class="lead">รวมบทความจากทีมงานท้องถิ่น<br/>ตั้งแต่การเลือกเส้นทาง การเลือกเรือ ไปจนถึง Checklist ก่อนออกเดินทาง</p>
    </div>
  </section>

  <section class="section">
    <div class="container">
      <div class="article-grid" id="articles-list"></div>
    </div>
  </section>

  <section class="section section-deep">
    <div class="container text-center" data-reveal>
      <h2>พร้อมเริ่มทริปทะเลตรังของคุณแล้วหรือยัง?</h2>
      <p class="lead" style="max-width:560px; margin:0 auto 1.6rem;">เลือกเรือ คำนวณราคา และจองผ่าน LINE ได้ในไม่กี่นาที พร้อมทีมแอดมินคอยตอบทุกคำถาม</p>
      <div class="btn-row center">
        <a class="btn btn-line btn-lg" href="booking.html"><span data-icon="line"></span>เริ่มจอง</a>
        <a class="btn btn-ghost btn-lg" href="programs.html">ดูโปรแกรม</a>
      </div>
    </div>
  </section>

  <div id="site-footer"></div>

  <script>document.write('<script src="assets/js/tt-cache-version.js?t='+Date.now()+'"><\/script>');</script>
  <script>document.write('<script src="assets/js/data-fallback.js?v='+(encodeURIComponent(window.__TT_SCRIPT_V||Date.now()))+'"><\/script>');</script>
  <script>document.write('<script src="assets/js/data.js?v='+(encodeURIComponent(window.__TT_SCRIPT_V||Date.now()))+'"><\/script>');</script>
  <script>document.write('<script src="assets/js/main.js?v='+(encodeURIComponent(window.__TT_SCRIPT_V||Date.now()))+'"><\/script>');</script>
  <script>
    document.addEventListener('DOMContentLoaded', () => {
      const { ARTICLES, IMAGES, ICONS } = window.TT;
      document.getElementById('hero-img').src = IMAGES.heroArticles;

      document.getElementById('articles-list').innerHTML = ARTICLES.map((a, i) => `
        <a class="article-card" href="article.html?slug=${a.slug}" style="--rd:${i*.06}s" data-reveal>
          <div class="article-card-media">
            <img src="${a.thumb}" alt="${a.title}" loading="lazy"/>
            <span class="article-tag">${a.category}</span>
          </div>
          <div class="article-card-body">
            <h3>${a.title}</h3>
            <p>${a.excerpt}</p>
            <div class="article-meta">
              <span>${a.date}</span>
              <span class="dot"></span>
              <span>${a.readTime}</span>
            </div>
          </div>
        </a>
      `).join('');

      window.TT.injectIcons();
      window.TT.bindReveal();
    });
  </script>
</body>
</html>
